name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  workflow_dispatch:

jobs:
  # ─── ユニットテスト ──────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with coverage
        run: go test -cover -coverprofile=coverage.out ./...

      - name: "Check coverage - middleware (target: 90%)"
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep "^github.com/n-yata/money-management/backend/src/middleware/" \
            | awk '{gsub(/%/, "", $3); sum += $3; count++} END {if (count > 0) printf "%.1f", sum/count; else print "0"}')
          echo "middleware coverage: ${COVERAGE}%"
          result=$(echo "${COVERAGE} >= 90" | bc -l)
          if [ "$result" -ne 1 ]; then
            echo "::error::middleware coverage ${COVERAGE}% is below the required 90%"
            exit 1
          fi

      - name: "Check coverage - authorizer JWT validation (target: 85%)"
        # main() 関数（Lambda エントリーポイント）と防衛的分岐は除外対象のため 85% を閾値とする
        run: |
          COVERAGE=$(go tool cover -func=coverage.out \
            | grep "^github.com/n-yata/money-management/backend/src/functions/authorizer/" \
            | awk '$2 != "main" {gsub(/%/, "", $3); sum += $3; count++} END {if (count > 0) printf "%.1f", sum/count; else print "0"}')
          echo "authorizer coverage (excluding main): ${COVERAGE}%"
          result=$(echo "${COVERAGE} >= 85" | bc -l)
          if [ "$result" -ne 1 ]; then
            echo "::error::authorizer coverage ${COVERAGE}% is below the required 85%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: backend/coverage.out

  # ─── 統合テスト ──────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Docker が利用可能な ubuntu-latest 上で実行。
    # testcontainers-go が MongoDB コンテナを自動起動するため
    # サービスコンテナの定義は不要。
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests with coverage
        run: go test -tags=integration -cover -coverprofile=coverage-integration.out -timeout=120s ./src/functions/... ./src/lib/...

      - name: Show integration test coverage
        run: go tool cover -func=coverage-integration.out

      - name: "Check total backend coverage (target: 70%)"
        # ハンドラーのテストは //go:build integration タグ付きのため、
        # 全体カバレッジは統合テスト結果（coverage-integration.out）で計測する
        run: |
          TOTAL=$(go tool cover -func=coverage-integration.out | tail -1 | awk '{gsub(/%/, "", $3); print $3}')
          echo "Total coverage: ${TOTAL}%"
          result=$(echo "${TOTAL} >= 70" | bc -l)
          if [ "$result" -ne 1 ]; then
            echo "::error::Total coverage ${TOTAL}% is below the required 70%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-coverage
          path: backend/coverage-integration.out
