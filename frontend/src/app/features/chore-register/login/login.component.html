<div class="login-container">
  <mat-card class="login-card">
    <mat-card-content>
      <div class="login-content">
        <div class="icon-wrapper">
          <mat-icon class="savings-icon">savings</mat-icon>
        </div>
        <div class="title-group">
          <h1 class="app-title">おこづかい管理</h1>
          <p class="app-subtitle">お手伝いをして<br>おこづかいをもらおう！</p>
        </div>
        <button
          mat-raised-button
          color="primary"
          class="login-button"
          (click)="login()"
        >
          ログイン
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
