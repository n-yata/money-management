@if (loading()) {
  <div class="loading-overlay">
    <mat-spinner></mat-spinner>
  </div>
}

<div class="screen">
  <div class="header">
    <button mat-icon-button (click)="goToDashboard()" aria-label="ダッシュボードへ戻る">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <span class="title">種類管理</span>
    <button mat-icon-button (click)="goToNew()" aria-label="種類を追加">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  @if (!loading() && allowanceTypes().length === 0) {
    <p class="empty-message">種類が登録されていません</p>
  }

  <div class="type-grid">
    @for (allowanceType of allowanceTypes(); track allowanceType.id) {
      <mat-card class="type-card" (click)="goToEdit(allowanceType)">
        <mat-card-content>
          <div class="amount-badge">¥{{ allowanceType.amount | number }}</div>
          <div class="type-name">{{ allowanceType.name }}</div>
          <mat-icon class="edit-icon">chevron_right</mat-icon>
        </mat-card-content>
      </mat-card>
    }
  </div>
</div>
